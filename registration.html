<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Conference Registration</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="css/main.css">
</head>

<body>

<header>
  <h1>Conference Registration</h1>
  <p>International Conference on Computing and Data Analytics</p>
</header>

<main>

<section>
  <h2>Participant Registration</h2>

  <form id="registration-form">

    <div>
      <label for="name">Full Name</label><br>
      <input
        type="text"
        id="name"
        name="name"
        placeholder="Enter your full name"
        required
      >
    </div>

    <br>

    <div>
      <label for="email">Email Address</label><br>
      <input
        type="email"
        id="email"
        name="email"
        placeholder="Enter your email"
        required
      >
    </div>

    <br>

    <div>
      <label for="institution">Institution / Organization</label><br>
      <input
        type="text"
        id="institution"
        name="institution"
        placeholder="University / Company"
      >
    </div>

    <br>

    <div>
      <label for="country">Country</label><br>
      <input
        type="text"
        id="country"
        name="country"
        placeholder="Country"
      >
    </div>

    <br>

    <div>
      <label for="role">Participant Type</label><br>
      <select id="role" name="role">

        <option value="student">Student</option>
        <option value="researcher">Researcher</option>
        <option value="faculty">Faculty</option>
        <option value="industry">Industry Professional</option>

      </select>
    </div>

    <br>

    <div>
      <label for="message">Additional Message</label><br>
      <textarea
        id="message"
        name="message"
        rows="4"
        placeholder="Optional message"
      ></textarea>
    </div>

    <br>

    <button type="submit">
      Register
    </button>

  </form>

</section>

</main>

<footer>

  <p>
    BS–MS (2025–2030) — Computer Science and Data Analytics  
    Indian Institute of Technology Patna
  </p>

</footer>

<script type="module" src="js/registration.js"></script>

</body>
</html>
