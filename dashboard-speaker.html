<div class="dashboard">

    <!-- USER INFO -->

    <div class="card">

        <h2>Speaker Information</h2>

        <div class="form-group">
            <label>Name</label>
            <input type="text" id="user-name" readonly>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="text" id="user-email" readonly>
        </div>

        <div class="form-group">
            <label>Institution</label>
            <input type="text" id="user-institution" readonly>
        </div>

        <button class="generate-btn" id="generate-pass">
            Generate Gate Pass
        </button>

    </div>


    <!-- PASS -->

    <div class="card" id="gatepass-section" style="display:none;">

        <div class="pass-card" id="pass-card">

            <div class="pass-header">

                <h2>
                    1st Conference on Optimization and Machine Learning
                </h2>

            </div>

            <div class="pass-body">

                <h1>Speaker Entry Pass</h1>

                <p>Indian Institute of Technology Patna</p>

                <div class="pass-info">

                    <p>
                        <b>Entry ID:</b>
                        <span id="entry-id"></span>
                    </p>

                    <p>
                        <b>Talk Title:</b>
                        <span id="pass-talk-title"></span>
                    </p>

                    <p>
                        <b>Status:</b>
                        <span id="pass-talk-status"></span>
                    </p>

                    <p>
                        <b>Talk Date:</b>
                        <span id="pass-talk-date"></span>
                    </p>

                    <p>
                        <b>Talk Slot:</b>
                        <span id="pass-talk-slot"></span>
                    </p>

                </div>

                <div id="qrcode"></div>

            </div>

        </div>

        <button class="download-btn" id="download-pass">
            Download PDF
        </button>

    </div>


    <!-- TALK FORM -->

    <div class="card" id="talk-form">

        <h2>Talk Submission</h2>

        <div class="form-group">
            <label>Talk Title</label>
            <input type="text" id="talk-title">
        </div>

        <div class="form-group">
            <label>Presentation Abstract</label>
            <textarea id="talk-abstract"></textarea>
        </div>

        <div class="form-group">
            <label>PPT Link</label>
            <input type="text" id="ppt-link">
        </div>

        <div class="form-group">

            <label>Talk Date</label>

            <select id="talk-date">

                <option value="">Select Date</option>

                <option>8 January 2027</option>
                <option>9 January 2027</option>
                <option>10 January 2027</option>
                <option>11 January 2027</option>
                <option>12 January 2027</option>

            </select>

        </div>

        <div class="form-group">

            <label>Available Slot</label>

            <select id="talk-slot">

                <option value="">Select Slot</option>

                <option>09:00 AM to 10:00 AM</option>
                <option>10:30 AM to 11:30 AM</option>
                <option>12:00 PM to 01:00 PM</option>
                <option>02:00 PM to 03:00 PM</option>
                <option>03:30 PM to 04:30 PM</option>

            </select>

        </div>

        <button class="submit-btn" id="submit-talk">
            Submit Talk
        </button>

    </div>


    <!-- TALK VIEW -->

    <div class="card" id="talk-view" style="display:none;">

        <h2>My Talk</h2>

        <table>

            <tr>
                <th>ID</th>
                <th>Talk</th>
                <th>Status</th>
                <th>Date</th>
                <th>Slot</th>
            </tr>

            <tr>

                <td id="talk-id"></td>

                <td id="talk-title-view"></td>

                <td>
                    <span class="status" id="talk-status">
                        Pending
                    </span>
                </td>

                <td id="talk-date-view"></td>

                <td id="talk-slot-view"></td>

            </tr>

        </table>


        <!-- EDIT SECTION -->

        <div id="edit-section" style="display:none; margin-top:30px;">

            <h2>Edit Talk</h2>

            <div class="form-group">
                <label>Talk Title</label>
                <input type="text" id="edit-talk-title">
            </div>

            <div class="form-group">
                <label>Presentation Abstract</label>
                <textarea id="edit-talk-abstract"></textarea>
            </div>

            <div class="form-group">
                <label>PPT Link</label>
                <input type="text" id="edit-ppt-link">
            </div>

            <div class="form-group">

                <label>Talk Date</label>

                <select id="edit-talk-date">

                    <option>8 January 2027</option>
                    <option>9 January 2027</option>
                    <option>10 January 2027</option>
                    <option>11 January 2027</option>
                    <option>12 January 2027</option>

                </select>

            </div>

            <div class="form-group">

                <label>Talk Slot</label>

                <select id="edit-talk-slot">

                    <option>09:00 AM to 10:00 AM</option>
                    <option>10:30 AM to 11:30 AM</option>
                    <option>12:00 PM to 01:00 PM</option>
                    <option>02:00 PM to 03:00 PM</option>
                    <option>03:30 PM to 04:30 PM</option>

                </select>

            </div>

            <button class="submit-btn" id="update-talk">
                Update Talk
            </button>

        </div>

    </div>

</div>
