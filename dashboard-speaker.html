<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#eef2f7;
    color:#222;
}

.navbar{
    width:100%;
    background:#0d1b2a;
    color:white;
    padding:18px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.nav-actions{
    display:flex;
    gap:16px;
}

.nav-actions button{
    padding:10px 18px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:1rem;
}

.logout-btn{
    background:#dc3545;
    color:white;
}

.profile-btn{
    background:white;
    color:#0d1b2a;
}

.dashboard{
    max-width:1200px;
    margin:auto;
    padding:30px;
}

.card{
    background:white;
    border-radius:14px;
    padding:25px;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
}

input,
textarea,
select{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:1rem;
}

textarea{
    height:120px;
}

.submit-btn{
    background:black;
    color:white;
    border:none;
    padding:1rem 2rem;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

.generate-btn{
    background:#0d6efd;
    color:white;
    border:none;
    padding:14px 22px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.download-btn{
    background:#198754;
    color:white;
    border:none;
    padding:12px 18px;
    border-radius:8px;
    cursor:pointer;
    margin-top:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#0d1b2a;
    color:white;
    padding:12px;
    text-align:left;
}

td{
    padding:12px;
    border-bottom:1px solid #ddd;
}

.status{
    padding:6px 12px;
    border-radius:20px;
    font-size:13px;
}

.pending{
    background:#fff3cd;
    color:#856404;
}

.confirmed{
    background:#d1e7dd;
    color:#0f5132;
}

.pass-card{
    width:816px;
    margin:auto;
    background:white;
    border:2px solid #0d1b2a;
    border-radius:14px;
    overflow:hidden;
    min-height:1056px;
}

.pass-header{
    background:#0d1b2a;
    color:white;
    padding:24px;
}

.pass-body{
    padding:40px;
    text-align:center;
}

.pass-info{
    margin-top:25px;
    text-align:left;
    line-height:2;
}

#qrcode{
    margin-top:30px;
}

#qrcode img{
    width:180px;
    height:180px;
}

@media screen and (max-width:900px){

    .dashboard{
        padding:20px;
    }

    .navbar{
        padding:16px 20px;
        flex-direction:column;
        align-items:flex-start;
        gap:16px;
    }

    .nav-actions{
        width:100%;
        flex-wrap:wrap;
    }

    .nav-actions button{
        width:100%;
    }

    .pass-card{
        width:100%;
        min-height:auto;
    }

}

@media screen and (max-width:600px){

    .dashboard{
        padding:14px;
    }

    .card{
        padding:16px;
    }

    .submit-btn,
    .generate-btn,
    .download-btn{
        width:100%;
    }

    .pass-body{
        padding:22px;
    }

}

</style>


<div class="navbar">

    <h2>Speaker Dashboard</h2>

    <div class="nav-actions">

        <button class="profile-btn" id="greeting">
            Hi, User
        </button>

        <button class="logout-btn" id="logout-btn">
            Logout
        </button>

    </div>

</div>


<div class="dashboard">

    <!-- USER INFO -->

    <div class="card">

        <h2>Speaker Information</h2>

        <div class="form-group">
            <label>Name</label>
            <input type="text" id="user-name" readonly>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="text" id="user-email" readonly>
        </div>

        <div class="form-group">
            <label>Institution</label>
            <input type="text" id="user-institution" readonly>
        </div>

        <button class="generate-btn" id="generate-pass">
            Generate Gate Pass
        </button>

    </div>


    <!-- PASS -->

    <div class="card" id="gatepass-section" style="display:none;">

        <div class="pass-card" id="pass-card">

            <div class="pass-header">

                <h2>
                    1st Conference on Optimization and Machine Learning
                </h2>

            </div>

            <div class="pass-body">

                <h1>Speaker Entry Pass</h1>

                <p>Indian Institute of Technology Patna</p>

                <div class="pass-info">

                    <p>
                        <b>Entry ID:</b>
                        <span id="entry-id"></span>
                    </p>

                    <p>
                        <b>Talk Title:</b>
                        <span id="pass-talk-title"></span>
                    </p>

                    <p>
                        <b>Status:</b>
                        <span id="pass-talk-status"></span>
                    </p>

                    <p>
                        <b>Talk Date:</b>
                        <span id="pass-talk-date"></span>
                    </p>

                    <p>
                        <b>Talk Slot:</b>
                        <span id="pass-talk-slot"></span>
                    </p>

                </div>

                <div id="qrcode"></div>

            </div>

        </div>

        <button class="download-btn" id="download-pass">
            Download PDF
        </button>

    </div>


    <!-- TALK SUBMISSION -->

    <div class="card" id="talk-form">

        <h2>Talk Submission</h2>

        <div class="form-group">
            <label>Talk Title</label>
            <input type="text" id="talk-title">
        </div>

        <div class="form-group">
            <label>Presentation Abstract</label>
            <textarea id="talk-abstract"></textarea>
        </div>

        <div class="form-group">
            <label>PPT Link</label>
            <input type="text" id="ppt-link">
        </div>

        <div class="form-group">
            <label>Select Talk Date</label>

            <select id="talk-date">

                <option value="">
                    Select Date
                </option>

                <option value="8 January 2027">
                    8 January 2027
                </option>

                <option value="9 January 2027">
                    9 January 2027
                </option>

                <option value="10 January 2027">
                    10 January 2027
                </option>

                <option value="11 January 2027">
                    11 January 2027
                </option>

                <option value="12 January 2027">
                    12 January 2027
                </option>

            </select>

        </div>

        <div class="form-group">

            <label>Select Available Slot</label>

            <select id="talk-slot">

                <option value="">
                    Select Slot
                </option>

                <option>
                    09:00 AM to 10:00 AM
                </option>

                <option>
                    10:30 AM to 11:30 AM
                </option>

                <option>
                    12:00 PM to 01:00 PM
                </option>

                <option>
                    02:00 PM to 03:00 PM
                </option>

                <option>
                    03:30 PM to 04:30 PM
                </option>

            </select>

        </div>

        <button class="submit-btn" id="submit-talk">
            Submit Talk
        </button>

    </div>


    <!-- VIEW -->

    <div class="card" id="talk-view" style="display:none;">

        <h2>My Talk</h2>

        <table>

            <tr>
                <th>ID</th>
                <th>Talk</th>
                <th>Status</th>
                <th>Date</th>
                <th>Slot</th>
            </tr>

            <tr>

                <td id="talk-id"></td>

                <td id="talk-title-view"></td>

                <td>
                    <span class="status" id="talk-status">
                        Pending
                    </span>
                </td>

                <td id="talk-date-view"></td>

                <td id="talk-slot-view"></td>

            </tr>

        </table>

    </div>

</div>


<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script type="module" src="js/dashboard-speaker.js"></script>
