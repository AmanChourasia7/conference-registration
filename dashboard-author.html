<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

    .dashboard h2 {
    margin-bottom: 1rem;
}

body{
    background:#eef2f7;
    color:#222;
}

.navbar{
    width:100%;
    background:#0d1b2a;
    color:white;
    padding:18px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.nav-actions{
    display:flex;
    gap:16px;
}

.nav-actions button{
    padding:10px 18px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.logout-btn{
    background:#dc3545;
    color:white;
}

.profile-btn{
    background:white;
    color:#0d1b2a;
}

.dashboard{
    max-width:1200px;
    margin:auto;
    padding:30px;
}

.card{
    background:white;
    border-radius:14px;
    padding:25px;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    margin-top: 16px;
}

input,
textarea{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size: 1rem;
}

textarea{
    height:120px;
}

.submit-btn{
    background: black;
    color: white;
    border: none;
    padding: 1rem 2rem;
    border-radius: 6px;
    font-size: 18px;
    cursor: pointer;
    font-weight: 500;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#0d1b2a;
    color:white;
    padding:12px;
    text-align:left;
}

td{
    padding:12px;
    border-bottom:1px solid #ddd;
}

.status{
    padding:6px 12px;
    border-radius:20px;
    font-size:13px;
}

.pending{
    background:#fff3cd;
    color:#856404;
}

.accepted{
    background:#d1e7dd;
    color:#0f5132;
}

.rejected{
    background:#f8d7da;
    color:#842029;
}

</style>


<div class="navbar">

    <h2>Author Dashboard</h2>

    <div class="nav-actions">

        <button class="profile-btn" id="greeting">
            Hi, User
        </button>

        <button class="logout-btn" id="logout-btn">
            Logout
        </button>

    </div>

</div>


<div class="dashboard">

    <!-- AUTHOR INFO -->

    <div class="card">

        <h2>Author Information</h2>

        <div class="form-group">
            <label>Email</label>
            <input type="text" id="user-email" readonly>
        </div>

        <div class="form-group">
            <label>Institution</label>
            <input type="text" id="user-institution" readonly>
        </div>

    </div>


    <!-- SUBMISSION FORM -->

    <div class="card" id="submission-form">

        <h2>Submit Research Paper</h2>

        <div class="form-group">
            <label>Paper Title</label>
            <input type="text" id="paper-title">
        </div>

        <div class="form-group">
            <label>Abstract</label>
            <textarea id="paper-abstract"></textarea>
        </div>

        <div class="form-group">
            <label>PDF Link</label>
            <input type="text" id="paper-link">
        </div>

        <button class="submit-btn" id="submit-paper">
            Submit Paper
        </button>

    </div>


    <!-- SUBMISSION VIEW -->

    <div class="card" id="submission-view" style="display:none;">

        <h2>My Submission</h2>

        <table>

            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Status</th>
                <th>Submitted</th>
                <th>Updated</th>
            </tr>

            <tr>
                <td id="sub-id"></td>
                <td id="sub-title"></td>

                <td>
                    <span class="status" id="status-text">
                        Pending
                    </span>
                </td>

                <td id="created-at"></td>
                <td id="updated-at"></td>
            </tr>

        </table>

        <br>

        <!-- EDIT SECTION -->

        <div id="edit-section">

            <h2>Edit Submission</h2>
<br/>
            <div class="form-group">
                <label>Paper Title</label>
                <input type="text" id="edit-title">
            </div>

            <div class="form-group">
                <label>Abstract</label>
                <textarea id="edit-abstract"></textarea>
            </div>

            <div class="form-group">
                <label>PDF Link</label>
                <input type="text" id="edit-link">
            </div>

            <button class="submit-btn" id="update-paper">
                Update Submission
            </button>

        </div>

    </div>

</div>

<script type="module" src="js/dashboard.js"></script>
<script type="module" src="js/dashboard-author.js"></script>
