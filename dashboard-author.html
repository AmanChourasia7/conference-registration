<h2 id="greeting"></h2>

<p>Email: <b id="user-email"></b></p>
<p>Affiliation: <span id="user-institution"></span></p>

<hr>

<p id="status-text"></p>

<hr>

<h3>Support</h3>

<textarea id="support-message" placeholder="Describe your issue" style="width:400px;height:80px;"></textarea><br><br>
<button id="send-support">Send</button>
