<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>

  <style>
    body {
      margin: 0;
      background: #f4f6f8;
      color: #1a1a1a;
    }

    .wrapper {
      max-width: 1000px;
      margin: 30px auto;
      background: #ffffff;
      padding: 28px;
      border-radius: 8px;
    }

    h2 {
      margin: 0 0 20px 0;
      font-weight: 600;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      font-size: 14px;
    }

    .email {
      color: #555;
    }

    .section {
      margin-top: 35px;
    }

    .label {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      display: block;
    }

    select,
    input,
    textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 16px;

      border: 1px solid #d6dbe1;
      border-radius: 6px;

      font-size: 14px;
      background: #fff;
    }

    textarea {
      min-height: 200px;
      resize: vertical;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    button {
      padding: 9px 14px;
      border-radius: 6px;
      border: 1px solid #d6dbe1;

      background: #2E75C7;
      color: #fff;

      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      background: #1f5ea8;
    }

    .secondary {
      background: #eef2f6;
      color: #333;
    }

    .secondary:hover {
      background: #e1e7ee;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 13px;
    }

    th, td {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid #e2e6ea;
    }

    th {
      background: #f0f3f7;
      font-weight: 600;
    }

    .table-actions button {
      margin-right: 6px;
      padding: 5px 8px;
      font-size: 12px;
    }

  </style>

</head>

<body>

<div class="wrapper">

  <div class="topbar">
    <h2>Admin Panel</h2>
    <div class="email">
      Logged in as: <b id="admin-email"></b>
    </div>
  </div>

  <!-- PAGE EDITOR -->
  <div class="section">

    <label class="label">Page</label>
    <select id="page-select">
      <option value="home">Home</option>
      <option value="committees">Committees</option>
    </select>

    <label class="label">Title</label>
    <input type="text" id="title-input">

    <label class="label">Content</label>
    <textarea id="content-input"></textarea>

    <div class="actions">
      <button id="load-btn">Load</button>
      <button id="save-btn">Save</button>
      <button id="backup-btn" class="secondary">Backup</button>
      <button id="logout-btn" class="secondary">Logout</button>
    </div>

  </div>

  <!-- USERS -->
  <div class="section">

    <h3>Users</h3>

    <button id="load-users-btn" class="secondary">Load Users</button>

    <table>
      <thead>
        <tr>
          <th>Email</th>
          <th>Role</th>
          <th>Blocked</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="users-table"></tbody>
    </table>

  </div>

  <!-- REGISTRATIONS -->
  <div class="section">

    <h3>Registrations</h3>

    <button id="load-registrations-btn" class="secondary">Load Registrations</button>

    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Institution</th>
          <th>Country</th>
          <th>Category</th>
        </tr>
      </thead>
      <tbody id="registrations-table"></tbody>
    </table>

  </div>

</div>

<script type="module" src="js/admin.js"></script>

</body>
</html>
