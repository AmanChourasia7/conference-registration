<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>

  <style>
    body {
      margin: 0;
      background: #f5f7fa;
      color: #1a1a1a;
    }

    .container {
      max-width: 1000px;
      margin: 40px auto;
      background: #ffffff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    h2, h3 {
      margin-top: 0;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      font-size: 14px;
    }

    .email {
      color: #555;
    }

    select,
    input,
    textarea {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      margin-bottom: 16px;

      border: 1px solid #d6dbe1;
      border-radius: 6px;
    }

    textarea {
      min-height: 200px;
      resize: vertical;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    button {
      padding: 8px 14px;
      border-radius: 6px;
      border: none;
      background: #2E75C7;
      color: white;
      cursor: pointer;
      font-size: 13px;
    }

    button:hover {
      background: #1f5ea8;
    }

    .secondary {
      background: #e9eef5;
      color: #333;
    }

    .secondary:hover {
      background: #d8e2ee;
    }

    .section {
      margin-top: 40px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 13px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #e5e9ef;
      text-align: left;
    }

    th {
      background: #f0f3f7;
      font-weight: 600;
    }

    .table-actions button {
      margin-right: 6px;
      padding: 5px 8px;
      font-size: 12px;
    }

  </style>

</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="topbar">
    <h2>Admin Panel</h2>
    <div class="email">
      Logged in as: <b id="admin-email"></b>
    </div>
  </div>

  <!-- PAGE EDITOR -->
  <div class="section">

    <h3>Page Editor</h3>

    <select id="page-select">
      <option value="home">Home</option>
      <option value="committees">Committees</option>
    </select>

    <input type="text" id="title-input" placeholder="Title">
    <textarea id="content-input"></textarea>

    <div class="actions">
      <button id="load-btn">Load</button>
      <button id="save-btn">Save</button>
      <button id="backup-btn" class="secondary">Backup</button>
      <button id="logout-btn" class="secondary">Logout</button>
    </div>

  </div>

  <!-- USERS -->
  <div class="section">

    <h3>Users</h3>

    <button id="load-users" class="secondary">Load Users</button>

    <table id="users-table">
      <thead>
        <tr>
          <th>Email</th>
          <th>Role</th>
          <th>Blocked</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

  </div>

  <!-- REGISTRATIONS -->
  <div class="section">

    <h3>Registrations</h3>

    <button id="load-registrations" class="secondary">Load Registrations</button>

    <table id="registrations-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Institution</th>
          <th>Country</th>
          <th>Category</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

  </div>

</div>

<script type="module" src="js/admin.js"></script>

</body>
</html>
